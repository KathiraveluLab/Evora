# Mayan Service Registry Configuration
# Nginx-style configuration for heterogeneous building blocks

service dataconsolidation {
    type composition;
    entry_point 192.168.0.164;
    description {
        consolidates data from various data sources
    };
    services {
        data_consolidate {
            order 1;
        }
        detect_duplicates {
            order 2;
            serialized false;
        }
        write {
            order 3;
            serialized true;
        }
    }
}

service dupl_instance_count {
    type simple;
    impl axis2 {
        endpoint http://localhost:8083/axis2/services/dupl_instance_count;
    }
    impl cxf {
        endpoint http://localhost:8084/cxf/services/dupl_instance_count;
    }
    impl mapreduce_hadoop {
        mra 192.168.0.133;
        mry 192.168.0.157;
    }
    impl hazelcast {
        hza 192.168.0.158;
        hzz 192.168.0.183;
    }
}
