version: '3.8'

services:
  # ActiveMQ Artemis for AMQP/M4T bridging
  activemq:
    image: apache/activemq-artemis:latest-alpine
    container_name: evora-activemq
    ports:
      - "61616:61616"  # AMQP/JMS
      - "8161:8161"    # Web Console (Admin:Admin)
    environment:
      - ARTEMIS_USER=admin
      - ARTEMIS_PASSWORD=admin
    networks:
      - evora-net

  # Axis2 for SOAP 1.1/1.2 legacy services
  axis2:
    image: isuru/axis2:latest
    container_name: evora-axis2
    ports:
      - "8080:8080"
    networks:
      - evora-net

  # Tomcat container ready for CXF/JAX-WS service deployment
  cxf-host:
    image: tomcat:9-jdk11-openjdk-slim
    container_name: evora-cxf
    ports:
      - "8081:8080"
    networks:
      - evora-net

networks:
  evora-net:
    driver: bridge
